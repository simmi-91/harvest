name: Deploy Harvest

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Deploy build artifacts to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ".next/,public/,package.json,package-lock.json,next.config.ts"
          target: "/tmp/harvest-deploy"
          rm: true

      - name: Deploy infrastructure files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml,scripts/init.sql,scripts/rollback.sh"
          target: "/tmp/harvest-infra"
          rm: true

      - name: Execute deployment on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # --- App ---
            cd /var/www/harvest/

            # Rotate: keep app_old until health check passes
            [ -d "app_old" ] && sudo rm -rf app_old
            [ -d "app" ] && sudo mv app app_old
            sudo mv /tmp/harvest-deploy app

            # Link .env.production (stored outside app/ so it survives rotations)
            sudo ln -sf /var/www/harvest/.env.production /var/www/harvest/app/.env.production

            cd app
            sudo npm ci --omit=dev
            sudo chmod -R 755 /var/www/harvest/app

            # --- Infrastructure ---
            sudo mv /tmp/harvest-infra/docker-compose.prod.yml /var/www/harvest/docker-compose.prod.yml
            sudo mkdir -p /var/www/harvest/scripts
            sudo mv /tmp/harvest-infra/scripts/init.sql /var/www/harvest/scripts/init.sql

            # --- Rollback script ---
            sudo mv /tmp/harvest-infra/scripts/rollback.sh /var/www/harvest/rollback.sh
            sudo chmod +x /var/www/harvest/rollback.sh

            # --- Database ---
            cd /var/www/harvest
            docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for database to be ready..."
            until docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U harvest; do
              sleep 2
            done

            # --- Restart app ---
            DEPLOY_USER=${{ secrets.DEPLOY_RUN_AS_USER }}
            sudo -u $DEPLOY_USER pm2 restart harvest \
              || sudo -u $DEPLOY_USER pm2 start npm --name harvest --cwd /var/www/harvest/app -- start -- -p 8030

            # --- Health check ---
            echo "Running health check..."
            HEALTHY=false
            for i in $(seq 1 10); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8030/ || echo "000")
              if [ "$STATUS" = "200" ]; then
                HEALTHY=true
                break
              fi
              echo "Attempt $i/10 — got $STATUS, retrying in 5s..."
              sleep 5
            done

            if [ "$HEALTHY" = "true" ]; then
              echo "Health check passed."
              sudo -u $DEPLOY_USER pm2 status
              docker compose -f /var/www/harvest/docker-compose.prod.yml ps
            else
              echo "Health check failed! Rolling back to previous version..."
              sudo -u $DEPLOY_USER pm2 stop harvest
              sudo rm -rf /var/www/harvest/app
              sudo mv /var/www/harvest/app_old /var/www/harvest/app
              sudo -u $DEPLOY_USER pm2 restart harvest \
                || sudo -u $DEPLOY_USER pm2 start npm --name harvest --cwd /var/www/harvest/app -- start -- -p 8030
              echo "Rollback complete. Deploy marked as failed."
              exit 1
            fi
